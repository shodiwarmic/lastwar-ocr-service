# Last War Screen Definitions — Catalog
#
# Lists every known screen definition with its disambiguation priority.
# Adapters MUST test screens in priority order (lowest number first) because
# some page_signals are shared across screens (e.g. both Daily and Weekly
# screens contain the word "Weekly") and the more specific screen must win.
#
# schema_version tracks the catalog format itself, not individual definitions.
schema_version: 1

screens:
  - id: strength_ranking
    file: screens/strength_ranking.yaml
    priority: 1
    # Rationale: "Strength Ranking" and its accompanying column headers
    # (Power/Kills/Donation) are unique to this screen. Check first to
    # prevent the word "Power" from ever reaching the daily/weekly matchers.

  - id: weekly_ranking
    file: screens/weekly_ranking.yaml
    priority: 2
    # Rationale: "Weekly Rank" is distinctive, but the Weekly tab label also
    # appears as text on Daily Rank screens. The weekly definition uses a
    # negative_signal ("Mon.", "Tues.", etc.) to reject screenshots that are
    # actually Daily screens. Check after strength_ranking, before daily.

  - id: daily_ranking
    file: screens/daily_ranking.yaml
    priority: 3
    # Rationale: Broadest match. Catches any screenshot that survived the
    # strength and weekly filters. The active day tab is determined by the
    # tabs.active_indicator after the layout is confirmed.

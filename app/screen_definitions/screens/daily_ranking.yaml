id: daily_ranking
version: 1
name: Daily Ranking
description: >
  Alliance VS points leaderboard for a single day. Displays columns for
  rank, commander name, and daily points. Six day sub-tabs (Mon–Sat)
  select which day's data is shown.

identification:
  page_signals:
    - "Daily Rank"
    - "Daily Ranking"
  negative_signals:
    - "Strength Ranking"
    - "STRENGTH"
  pre_ocr_hint:
    x_hint: 0.35
    y_hint: 0.20
    color:
      named: orange
      hsv_override:
        h_min: 0.014
        h_max: 0.153
        s_min: 0.40
        v_min: 0.55
    confidence: 0.85

boundaries:
  header:
    signals: ["Commander", "Points"]
    search_region: {y_min: 0.0, y_max: 0.40}
    anchor_offset: {type: below_bottom_edge, offset_fraction: 0.0}
  footer:
    signals: ["Your Alliance"]
    search_region: {y_min: 0.60, y_max: 1.0}
    anchor_offset: {type: above_top_edge, offset_fraction: 0.0}

chrome:
  top_fraction: 0.22
  bottom_fraction: 0.12

tabs:
  search_region: {y_min: 0.00, y_max: 0.25}
  y_hint: 0.20
  active_indicator:
    strategy: brightest
    min_gap: 0.04
    bbox_padding_fraction: 0.007
  items:
    - {id: monday,    category: monday,    signals: ["Mon", "Mon."],     x_hint: 0.10}
    - {id: tuesday,   category: tuesday,   signals: ["Tues", "Tues."],   x_hint: 0.26}
    - {id: wednesday, category: wednesday, signals: ["Wed", "Wed."],     x_hint: 0.42}
    - {id: thursday,  category: thursday,  signals: ["Thur", "Thur."],   x_hint: 0.58}
    - {id: friday,    category: friday,    signals: ["Fri", "Fri."],     x_hint: 0.74}
    - {id: saturday,  category: saturday,  signals: ["Sat", "Sat."],     x_hint: 0.90}

columns:
  - {id: rank,  type: ignore, x_min: 0.00, x_max: 0.15}
  - {id: name,  type: name,   x_min: 0.15, x_max: 0.60}
  - {id: score, type: score,  x_min: 0.60, x_max: 1.00}

row_clustering:
  strategy: score_anchored
  score_anchored: {up_band_fraction: 0.021, down_band_fraction: 0.002}
  y_proximity: {tolerance_fraction: 0.02, min_tolerance_px: 20}
  min_score: 1000
  word_gap_fraction: 0.015
  min_word_gap_px: 8

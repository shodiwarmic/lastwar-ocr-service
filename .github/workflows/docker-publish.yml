name: Build and Publish Docker Images

# Builds and publishes BOTH OCR-service images:
#   * :latest  — Dockerfile (Google Cloud Vision backend, Cloud Run default).
#   * :local   — Dockerfile.local (PaddleOCR sidecar for self-hosted
#                installations of lastwar-alliance-manager).
#
# alliance-manager's docker-compose.local-ocr.yml references
# ghcr.io/shodiwarmic/lastwar-ocr-service:local; this workflow keeps
# that tag in sync with main on every push.

on:
  push:
    # `align-screen-definitions-contract` is included so the build can
    # be verified end-to-end before merging the parent PR. Remove this
    # branch from the list once the PR is merged so the workflow only
    # runs from main going forward.
    branches: ['main', 'align-screen-definitions-contract']
  # Allow manual rebuilds (e.g. after tweaking a Dockerfile without
  # touching code) from the GitHub UI.
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-cloud:
    name: Build cloud image (:latest)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          # Pull the screen_definitions submodule so the Cloud Vision
          # build bundles the same YAML pinned at the parent commit.
          submodules: recursive

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push :latest (Cloud Vision)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          # GitHub Actions cache so Cloud-Vision rebuilds reuse the
          # pip-install layer when only application code changes.
          cache-from: type=gha,scope=cloud
          cache-to: type=gha,mode=max,scope=cloud

  build-local:
    name: Build local image (:local)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push :local (PaddleOCR)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.local
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:local
          # PaddleOCR + paddlepaddle pip install is multi-GB and slow;
          # cache aggressively so subsequent builds only re-run when
          # requirements-local.txt or Dockerfile.local change.
          cache-from: type=gha,scope=local
          cache-to: type=gha,mode=max,scope=local

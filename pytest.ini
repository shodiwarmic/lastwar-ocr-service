[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
pythonpath = .

# Silence protobuf C++ binding deprecation warnings emitted by
# google-cloud-vision. They surface from `google._upb._message` and are
# upstream noise — will resolve when the SDK ships an updated protobuf
# dependency. Scoped narrowly so our own DeprecationWarnings still surface.
filterwarnings =
    ignore:.*MessageMapContainer.*:DeprecationWarning
    ignore:.*ScalarMapContainer.*:DeprecationWarning
